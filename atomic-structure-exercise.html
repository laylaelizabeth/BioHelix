<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHEM-01 :: Atomic Structure -- Interactive Exercise</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background: #ffffff;
    font-family: Georgia, 'Times New Roman', Times, serif;
    color: #000000;
  }
  #exercise {
    max-width: 720px;
    margin: 0 auto;
    border: 2px solid #000000;
    padding: 16px 20px 20px;
  }
  .tag {
    display: inline-block;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    letter-spacing: 1px;
    background: #f0f0f0;
    border: 1px solid #000000;
    padding: 2px 8px;
    margin-bottom: 8px;
  }
  h2 { font-size: 22px; margin: 4px 0 4px; }
  .instructions {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    margin: 0 0 14px;
    color: #333333;
  }
  #stage { display: flex; gap: 20px; flex-wrap: wrap; }
  #diagram-wrap {
    flex: 1 1 340px;
    border: 1px solid #000000;
    background: #fafcff;
    padding: 6px;
  }
  #diagram-wrap svg { width: 100%; height: auto; display: block; }

  .pin { cursor: pointer; }
  .pin circle.dot { fill: #ffffff; stroke: #000000; stroke-width: 2; }
  .pin text.num {
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    font-weight: bold;
    fill: #000000;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .pin.solved circle.dot { fill: #dbe8ff; stroke: #0000ee; }
  .pin.solved text.num { fill: #0000ee; }
  .pin.wrong circle.dot { fill: #ffd9d9; stroke: #cc0000; }

  #colorKey {
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 8px 2px 0;
  }
  #colorKey .swatch {
    display: inline-block;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 1.5px solid #000000;
    vertical-align: middle;
    margin-right: 5px;
    position: relative;
    top: -1px;
  }

  #legend {
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #000000;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 10px;
  }
  #legend span.pending { color: #999999; }
  #legend span.done { color: #0000ee; font-weight: bold; }

  #wordbank { flex: 1 1 220px; min-width: 200px; }
  #wordbank h3 {
    font-size: 14px;
    margin: 0 0 8px;
    font-family: 'Courier New', Courier, monospace;
    font-weight: normal;
    border-bottom: 1px dashed #000000;
    padding-bottom: 4px;
  }
  .word-btn {
    display: block;
    width: 100%;
    text-align: left;
    margin-bottom: 8px;
    font-family: Tahoma, Verdana, Arial, sans-serif;
    font-size: 13px;
    background: #d4d0c8;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    padding: 7px 10px;
    cursor: pointer;
  }
  .word-btn:active {
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
  }
  .word-btn.armed {
    background: #0000ee;
    color: #ffffff;
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
  }
  .word-btn.used {
    background: #f0f0f0;
    color: #999999;
    text-decoration: line-through;
    cursor: default;
    border: 1px solid #cccccc;
  }

  #statusbar {
    margin-top: 16px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    border-top: 1px solid #000000;
    padding-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  #statusbar .readout::after {
    content: '_';
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  #controls button {
    font-family: Tahoma, Verdana, Arial, sans-serif;
    font-size: 12px;
    background: #d4d0c8;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    padding: 5px 12px;
    cursor: pointer;
    margin-left: 8px;
  }
  #controls button:active {
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
  }

  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal-box {
    background: #d4d0c8;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    width: 300px;
    font-family: Tahoma, Verdana, Arial, sans-serif;
  }
  #modal-title {
    background: #0000ee;
    color: #ffffff;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 8px;
  }
  #modal-body { padding: 16px; font-size: 13px; text-align: center; }
  #modal-body button { margin-top: 12px; }
</style>
</head>
<body>

<div id="exercise">
  <span class="tag">CHEM-01 :: EXERCISE</span>
  <h2>Atomic Structure</h2>
  <p class="instructions">&gt; Click a term below, then click the matching part of the atom diagram.</p>

  <div id="stage">
    <div id="diagram-wrap">
      <svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
        <!-- electron shells -->
        <circle cx="200" cy="160" r="65" fill="none" stroke="#555555" stroke-width="1.5" stroke-dasharray="4,3"/>
        <circle cx="200" cy="160" r="105" fill="none" stroke="#555555" stroke-width="1.5" stroke-dasharray="4,3"/>

        <!-- nucleus: alternating protons/neutrons in a rosette -->
        <circle cx="216" cy="132.3" r="10" fill="#e05a5a" stroke="#000000" stroke-width="2"/>
        <circle cx="168" cy="160" r="10" fill="#e05a5a" stroke="#000000" stroke-width="2"/>
        <circle cx="216" cy="187.7" r="10" fill="#e05a5a" stroke="#000000" stroke-width="2"/>
        <circle cx="232" cy="160" r="10" fill="#b0b0b0" stroke="#000000" stroke-width="2"/>
        <circle cx="184" cy="132.3" r="10" fill="#b0b0b0" stroke="#000000" stroke-width="2"/>
        <circle cx="184" cy="187.7" r="10" fill="#b0b0b0" stroke="#000000" stroke-width="2"/>
        <g font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" style="pointer-events:none">
          <text x="216" y="136.3">+</text>
          <text x="168" y="164">+</text>
          <text x="216" y="191.7">+</text>
          <text x="232" y="163.5" fill="#333333">n</text>
          <text x="184" y="135.8" fill="#333333">n</text>
          <text x="184" y="191.2" fill="#333333">n</text>
        </g>

        <!-- electrons: 2 inner shell, 4 outer (valence) shell -->
        <circle cx="200" cy="95" r="6" fill="#4a7fd6" stroke="#000000" stroke-width="1.5"/>
        <circle cx="200" cy="225" r="6" fill="#4a7fd6" stroke="#000000" stroke-width="1.5"/>
        <circle cx="274.2" cy="85.8" r="6" fill="#4a7fd6" stroke="#000000" stroke-width="1.5"/>
        <circle cx="125.8" cy="85.8" r="6" fill="#4a7fd6" stroke="#000000" stroke-width="1.5"/>
        <circle cx="125.8" cy="234.2" r="6" fill="#4a7fd6" stroke="#000000" stroke-width="1.5"/>
        <circle cx="274.2" cy="234.2" r="6" fill="#4a7fd6" stroke="#000000" stroke-width="1.5"/>

        <!-- numbered pins -->
        <g class="pin" data-answer="nucleus" data-num="1" transform="translate(200,160)">
          <circle class="dot" r="13"/><text class="num" y="1">1</text>
        </g>
        <g class="pin" data-answer="proton" data-num="2" transform="translate(168,160)">
          <circle class="dot" r="13"/><text class="num" y="1">2</text>
        </g>
        <g class="pin" data-answer="neutron" data-num="3" transform="translate(232,160)">
          <circle class="dot" r="13"/><text class="num" y="1">3</text>
        </g>
        <g class="pin" data-answer="electron" data-num="4" transform="translate(200,95)">
          <circle class="dot" r="13"/><text class="num" y="1">4</text>
        </g>
        <g class="pin" data-answer="shell" data-num="5" transform="translate(265,160)">
          <circle class="dot" r="13"/><text class="num" y="1">5</text>
        </g>
        <g class="pin" data-answer="valence" data-num="6" transform="translate(274.2,85.8)">
          <circle class="dot" r="13"/><text class="num" y="1">6</text>
        </g>
      </svg>
      <div id="colorKey">
        <span><span class="swatch" style="background:#e05a5a"></span>Proton (+)</span>
        <span><span class="swatch" style="background:#b0b0b0"></span>Neutron (n)</span>
        <span><span class="swatch" style="background:#4a7fd6"></span>Electron (&minus;)</span>
      </div>
      <div id="legend">
        <span class="pending" data-legend="1">1. ?</span>
        <span class="pending" data-legend="2">2. ?</span>
        <span class="pending" data-legend="3">3. ?</span>
        <span class="pending" data-legend="4">4. ?</span>
        <span class="pending" data-legend="5">5. ?</span>
        <span class="pending" data-legend="6">6. ?</span>
      </div>
    </div>

    <div id="wordbank">
      <h3>&gt; TERM BANK</h3>
      <div id="words"></div>
    </div>
  </div>

  <div id="statusbar">
    <div class="readout" id="readout">MATCHED: 0/6&nbsp;&nbsp;&nbsp;MISTAKES: 0</div>
    <div id="controls">
      <button id="newRoundBtn">New Round</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title">BIOHELIX.EXE</div>
    <div id="modal-body">
      <div>ATOM FULLY MAPPED.<br>STRUCTURE COMPLETE.</div>
      <button id="modalOkBtn">OK</button>
    </div>
  </div>
</div>

<script>
(function () {
  var TERMS = [
    { key: 'nucleus', label: 'Nucleus' },
    { key: 'proton', label: 'Proton' },
    { key: 'neutron', label: 'Neutron' },
    { key: 'electron', label: 'Electron' },
    { key: 'shell', label: 'Electron Shell' },
    { key: 'valence', label: 'Valence Electron' }
  ];

  var wordsEl = document.getElementById('words');
  var readout = document.getElementById('readout');
  var pins = Array.prototype.slice.call(document.querySelectorAll('.pin'));
  var armedKey = null;
  var matched = 0;
  var mistakes = 0;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function renderWords() {
    wordsEl.innerHTML = '';
    shuffle(TERMS).forEach(function (t) {
      var btn = document.createElement('button');
      btn.className = 'word-btn';
      btn.type = 'button';
      btn.textContent = t.label;
      btn.dataset.key = t.key;
      btn.addEventListener('click', function () {
        if (btn.classList.contains('used')) return;
        document.querySelectorAll('.word-btn').forEach(function (b) { b.classList.remove('armed'); });
        armedKey = t.key;
        btn.classList.add('armed');
      });
      wordsEl.appendChild(btn);
    });
  }

  function updateReadout() {
    readout.innerHTML = 'MATCHED: ' + matched + '/6&nbsp;&nbsp;&nbsp;MISTAKES: ' + mistakes;
  }

  function disableWord(key) {
    var btn = wordsEl.querySelector('[data-key="' + key + '"]');
    if (btn) {
      btn.classList.remove('armed');
      btn.classList.add('used');
    }
  }

  pins.forEach(function (pin) {
    pin.addEventListener('click', function () {
      if (pin.classList.contains('solved') || !armedKey) return;
      var answer = pin.dataset.answer;
      if (armedKey === answer) {
        pin.classList.add('solved');
        var term = TERMS.filter(function (t) { return t.key === answer; })[0];
        var legendEntry = document.querySelector('[data-legend="' + pin.dataset.num + '"]');
        legendEntry.textContent = pin.dataset.num + '. ' + term.label;
        legendEntry.classList.remove('pending');
        legendEntry.classList.add('done');
        disableWord(answer);
        matched += 1;
        armedKey = null;
        updateReadout();
        if (matched === 6) {
          document.getElementById('modal-overlay').classList.add('show');
        }
      } else {
        mistakes += 1;
        pin.classList.add('wrong');
        setTimeout(function () { pin.classList.remove('wrong'); }, 500);
        armedKey = null;
        document.querySelectorAll('.word-btn').forEach(function (b) { b.classList.remove('armed'); });
        updateReadout();
      }
    });
  });

  document.getElementById('newRoundBtn').addEventListener('click', function () {
    matched = 0;
    mistakes = 0;
    armedKey = null;
    pins.forEach(function (pin) {
      pin.classList.remove('solved', 'wrong');
    });
    document.querySelectorAll('#legend span').forEach(function (span) {
      span.textContent = span.dataset.legend + '. ?';
      span.classList.remove('done');
      span.classList.add('pending');
    });
    document.getElementById('modal-overlay').classList.remove('show');
    renderWords();
    updateReadout();
  });

  document.getElementById('modalOkBtn').addEventListener('click', function () {
    document.getElementById('modal-overlay').classList.remove('show');
  });

  renderWords();
  updateReadout();
})();
</script>

</body>
</html>
