<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BIO-06 :: Ecosystems and Food Webs -- Interactive Exercise</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background: #ffffff;
    font-family: Georgia, 'Times New Roman', Times, serif;
    color: #000000;
  }
  #exercise {
    max-width: 720px;
    margin: 0 auto;
    border: 2px solid #000000;
    padding: 16px 20px 20px;
  }
  .tag {
    display: inline-block;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    letter-spacing: 1px;
    background: #f0f0f0;
    border: 1px solid #000000;
    padding: 2px 8px;
    margin-bottom: 8px;
  }
  h2 {
    font-size: 22px;
    margin: 4px 0 4px;
  }
  .instructions {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    margin: 0 0 14px;
    color: #333333;
  }
  #stage {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  #diagram-wrap {
    flex: 1 1 340px;
    border: 1px solid #000000;
    background: #f7faf3;
    padding: 6px;
  }
  #diagram-wrap svg { width: 100%; height: auto; display: block; }

  .pin { cursor: pointer; }
  .pin circle.dot {
    fill: #ffffff;
    stroke: #000000;
    stroke-width: 2;
  }
  .pin text.num {
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    font-weight: bold;
    fill: #000000;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .pin.solved circle.dot {
    fill: #dbe8ff;
    stroke: #0000ee;
  }
  .pin.solved text.num { display: none; }
  .pin.solved text.label {
    font-family: Georgia, serif;
    font-size: 10px;
    font-weight: bold;
    fill: #0000ee;
    text-anchor: middle;
  }
  .pin.wrong circle.dot {
    fill: #ffd9d9;
    stroke: #cc0000;
  }

  #wordbank {
    flex: 1 1 220px;
    min-width: 200px;
  }
  #wordbank h3 {
    font-size: 14px;
    margin: 0 0 8px;
    font-family: 'Courier New', Courier, monospace;
    font-weight: normal;
    border-bottom: 1px dashed #000000;
    padding-bottom: 4px;
  }
  .word-btn {
    display: block;
    width: 100%;
    text-align: left;
    margin-bottom: 8px;
    font-family: Tahoma, Verdana, Arial, sans-serif;
    font-size: 13px;
    background: #d4d0c8;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    padding: 7px 10px;
    cursor: pointer;
  }
  .word-btn:active {
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
  }
  .word-btn.armed {
    background: #0000ee;
    color: #ffffff;
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
  }
  .word-btn.used {
    background: #f0f0f0;
    color: #999999;
    text-decoration: line-through;
    cursor: default;
    border: 1px solid #cccccc;
  }

  #statusbar {
    margin-top: 16px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    border-top: 1px solid #000000;
    padding-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  #statusbar .readout::after {
    content: '_';
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  #controls button {
    font-family: Tahoma, Verdana, Arial, sans-serif;
    font-size: 12px;
    background: #d4d0c8;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    padding: 5px 12px;
    cursor: pointer;
    margin-left: 8px;
  }
  #controls button:active {
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
  }

  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal-box {
    background: #d4d0c8;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    width: 300px;
    font-family: Tahoma, Verdana, Arial, sans-serif;
  }
  #modal-title {
    background: #0000ee;
    color: #ffffff;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 8px;
  }
  #modal-body {
    padding: 16px;
    font-size: 13px;
    text-align: center;
  }
  #modal-body button {
    margin-top: 12px;
  }
</style>
</head>
<body>

<div id="exercise">
  <span class="tag">BIO-06 :: EXERCISE</span>
  <h2>Ecosystems and Food Webs</h2>
  <p class="instructions">&gt; Click a term below, then click the matching organism in the scene.</p>

  <div id="stage">
    <div id="diagram-wrap">
      <svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="400" height="190" fill="#eaf4fb"/>
        <rect x="0" y="190" width="400" height="130" fill="#eef7e3"/>
        <line x1="0" y1="190" x2="400" y2="190" stroke="#bfdca0" stroke-width="2"/>

        <!-- sun -->
        <g transform="translate(340,55)">
          <g stroke="#d99a00" stroke-width="3">
            <line x1="0" y1="-26" x2="0" y2="-34"/>
            <line x1="18.4" y1="-18.4" x2="24" y2="-24"/>
            <line x1="26" y1="0" x2="34" y2="0"/>
            <line x1="18.4" y1="18.4" x2="24" y2="24"/>
            <line x1="0" y1="26" x2="0" y2="34"/>
            <line x1="-18.4" y1="18.4" x2="-24" y2="24"/>
            <line x1="-26" y1="0" x2="-34" y2="0"/>
            <line x1="-18.4" y1="-18.4" x2="-24" y2="-24"/>
          </g>
          <circle r="24" fill="#ffe9a8" stroke="#000000" stroke-width="2"/>
        </g>

        <!-- plant / producer (grass tuft) -->
        <g transform="translate(65,225)" fill="none" stroke="#3f8f3f" stroke-width="3" stroke-linecap="round">
          <path d="M-14,10 Q-16,-10 -10,-26"/>
          <path d="M-7,10 Q-9,-16 -3,-30"/>
          <path d="M0,10 Q0,-20 0,-34"/>
          <path d="M7,10 Q9,-16 3,-30"/>
          <path d="M14,10 Q16,-10 10,-26"/>
        </g>

        <!-- grasshopper / primary consumer -->
        <g transform="translate(150,222)">
          <g stroke="#000000" stroke-width="2" fill="none">
            <path d="M-10,5 L-18,14 L-14,24"/>
            <path d="M2,6 L6,13"/>
            <path d="M19,-6 L26,-14"/>
            <path d="M21,-4 L29,-9"/>
          </g>
          <ellipse rx="14" ry="7" fill="#8fbf5f" stroke="#000000" stroke-width="2"/>
          <circle cx="16" cy="-2" r="5" fill="#8fbf5f" stroke="#000000" stroke-width="2"/>
        </g>

        <!-- frog / secondary consumer -->
        <g transform="translate(235,240)">
          <ellipse cx="-20" cy="4" rx="9" ry="6" fill="#7fbf7f" stroke="#000000" stroke-width="1.5"/>
          <ellipse cx="20" cy="4" rx="9" ry="6" fill="#7fbf7f" stroke="#000000" stroke-width="1.5"/>
          <ellipse rx="18" ry="13" fill="#7fbf7f" stroke="#000000" stroke-width="2"/>
          <ellipse cx="-16" cy="8" rx="6" ry="4" fill="#7fbf7f" stroke="#000000" stroke-width="1.5"/>
          <ellipse cx="16" cy="8" rx="6" ry="4" fill="#7fbf7f" stroke="#000000" stroke-width="1.5"/>
          <circle cx="-8" cy="-13" r="5" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
          <circle cx="8" cy="-13" r="5" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
          <circle cx="-8" cy="-13" r="2" fill="#000000"/>
          <circle cx="8" cy="-13" r="2" fill="#000000"/>
        </g>

        <!-- snake / tertiary consumer -->
        <g transform="translate(305,260)">
          <path d="M-40,10 C-25,-10 -10,25 5,0 C15,-15 25,10 35,-5"
                fill="none" stroke="#8a9a4a" stroke-width="9" stroke-linecap="round"/>
          <ellipse cx="38" cy="-6" rx="7" ry="5" fill="#8a9a4a" stroke="#000000" stroke-width="2"/>
          <circle cx="40" cy="-8" r="1.2" fill="#000000"/>
          <path d="M45,-6 L50,-9 M45,-6 L50,-3" stroke="#aa2222" stroke-width="1"/>
        </g>

        <!-- mushroom / decomposer -->
        <g transform="translate(110,285)">
          <rect x="-5" y="-2" width="10" height="16" rx="2" fill="#f2e9d8" stroke="#000000" stroke-width="1.5"/>
          <path d="M-18,-2 C-18,-22 18,-22 18,-2 Z" fill="#b5453a" stroke="#000000" stroke-width="2"/>
          <circle cx="-8" cy="-12" r="2.5" fill="#ffffff"/>
          <circle cx="6" cy="-15" r="2" fill="#ffffff"/>
          <circle cx="2" cy="-8" r="2.2" fill="#ffffff"/>
          <circle cx="-14" cy="14" r="1.5" fill="#6b4a2a"/>
          <circle cx="16" cy="15" r="1.5" fill="#6b4a2a"/>
        </g>

        <!-- numbered pins, centered on each icon above -->
        <g class="pin" data-answer="sun" transform="translate(340,55)">
          <circle class="dot" r="13"/><text class="num" y="1">1</text>
          <text class="label" y="4" style="display:none">Energy Source</text>
        </g>
        <g class="pin" data-answer="producer" transform="translate(65,212)">
          <circle class="dot" r="13"/><text class="num" y="1">2</text>
          <text class="label" y="4" style="display:none">Producer</text>
        </g>
        <g class="pin" data-answer="primary" transform="translate(150,222)">
          <circle class="dot" r="13"/><text class="num" y="1">3</text>
          <text class="label" y="4" style="display:none">Primary Consumer</text>
        </g>
        <g class="pin" data-answer="secondary" transform="translate(235,240)">
          <circle class="dot" r="13"/><text class="num" y="1">4</text>
          <text class="label" y="4" style="display:none">Secondary Consumer</text>
        </g>
        <g class="pin" data-answer="tertiary" transform="translate(305,260)">
          <circle class="dot" r="13"/><text class="num" y="1">5</text>
          <text class="label" y="4" style="display:none">Tertiary Consumer</text>
        </g>
        <g class="pin" data-answer="decomposer" transform="translate(110,285)">
          <circle class="dot" r="13"/><text class="num" y="1">6</text>
          <text class="label" y="4" style="display:none">Decomposer</text>
        </g>
      </svg>
    </div>

    <div id="wordbank">
      <h3>&gt; TERM BANK</h3>
      <div id="words"></div>
    </div>
  </div>

  <div id="statusbar">
    <div class="readout" id="readout">MATCHED: 0/6&nbsp;&nbsp;&nbsp;MISTAKES: 0</div>
    <div id="controls">
      <button id="newRoundBtn">New Round</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title">BIOHELIX.EXE</div>
    <div id="modal-body">
      <div>FOOD CHAIN COMPLETE.<br>ENERGY FLOW MAPPED.</div>
      <button id="modalOkBtn">OK</button>
    </div>
  </div>
</div>

<script>
(function () {
  var TERMS = [
    { key: 'sun', label: 'Energy Source' },
    { key: 'producer', label: 'Producer' },
    { key: 'primary', label: 'Primary Consumer' },
    { key: 'secondary', label: 'Secondary Consumer' },
    { key: 'tertiary', label: 'Tertiary Consumer' },
    { key: 'decomposer', label: 'Decomposer' }
  ];

  var wordsEl = document.getElementById('words');
  var readout = document.getElementById('readout');
  var pins = Array.prototype.slice.call(document.querySelectorAll('.pin'));
  var armedKey = null;
  var matched = 0;
  var mistakes = 0;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function renderWords() {
    wordsEl.innerHTML = '';
    shuffle(TERMS).forEach(function (t) {
      var btn = document.createElement('button');
      btn.className = 'word-btn';
      btn.type = 'button';
      btn.textContent = t.label;
      btn.dataset.key = t.key;
      btn.addEventListener('click', function () {
        if (btn.classList.contains('used')) return;
        document.querySelectorAll('.word-btn').forEach(function (b) { b.classList.remove('armed'); });
        armedKey = t.key;
        btn.classList.add('armed');
      });
      wordsEl.appendChild(btn);
    });
  }

  function updateReadout() {
    readout.innerHTML = 'MATCHED: ' + matched + '/6&nbsp;&nbsp;&nbsp;MISTAKES: ' + mistakes;
  }

  function disableWord(key) {
    var btn = wordsEl.querySelector('[data-key="' + key + '"]');
    if (btn) {
      btn.classList.remove('armed');
      btn.classList.add('used');
    }
  }

  pins.forEach(function (pin) {
    pin.addEventListener('click', function () {
      if (pin.classList.contains('solved') || !armedKey) return;
      var answer = pin.dataset.answer;
      if (armedKey === answer) {
        pin.classList.add('solved');
        pin.querySelector('.label').style.display = '';
        var term = TERMS.filter(function (t) { return t.key === answer; })[0];
        pin.querySelector('.label').textContent = term.label;
        disableWord(answer);
        matched += 1;
        armedKey = null;
        updateReadout();
        if (matched === 6) {
          document.getElementById('modal-overlay').classList.add('show');
        }
      } else {
        mistakes += 1;
        pin.classList.add('wrong');
        setTimeout(function () { pin.classList.remove('wrong'); }, 500);
        armedKey = null;
        document.querySelectorAll('.word-btn').forEach(function (b) { b.classList.remove('armed'); });
        updateReadout();
      }
    });
  });

  document.getElementById('newRoundBtn').addEventListener('click', function () {
    matched = 0;
    mistakes = 0;
    armedKey = null;
    pins.forEach(function (pin) {
      pin.classList.remove('solved', 'wrong');
      pin.querySelector('.label').style.display = 'none';
    });
    document.getElementById('modal-overlay').classList.remove('show');
    renderWords();
    updateReadout();
  });

  document.getElementById('modalOkBtn').addEventListener('click', function () {
    document.getElementById('modal-overlay').classList.remove('show');
  });

  renderWords();
  updateReadout();
})();
</script>

</body>
</html>
